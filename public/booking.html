<!DOCTYPE html><html lang="kk"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Брондау — Sky Taxi</title><link rel="manifest" href="/manifest.webmanifest"/><link rel="icon" href="/icons/icon.svg" type="image/svg+xml"/><link rel="stylesheet" href="/css/styles.css"/></head><body><div data-include="header"></div><main class="page-shell container two-col-layout"><section class="panel"><span class="eyebrow">Онлайн брондау</span><h1>Тапсырыс рәсімдеу және Kaspi QR предоплата</h1><form id="bookingForm" class="stack-form"><div class="grid-2"><input name="customerName" placeholder="Аты-жөніңіз" required/><input name="phone" placeholder="Телефон" required/></div><div class="grid-2"><select name="service" id="bookingService" required></select><input type="number" name="passengers" min="1" value="1" required/></div><div class="grid-2"><input name="from" placeholder="Қай жерден" required/><input name="to" placeholder="Қай жерге" required/></div><div class="grid-2"><input type="date" name="date" required/><input type="time" name="time" required/></div><div class="grid-2"><input type="number" name="price" id="bookingPrice" placeholder="Жалпы баға" required/><input type="number" name="prepayment" placeholder="Предоплата" required/></div><select name="paymentMethod"><option>Kaspi QR</option><option>Картамен төлеу</option><option>Қолма-қол</option></select><button class="btn btn-primary" type="submit">Брондауды растау</button><p class="form-message" id="bookingMessage"></p></form></section><aside class="panel side-panel"><div class="kaspi-box"><img src="/assets/images/kaspi-qr.png" alt="Kaspi QR"/><div><span class="eyebrow">Kaspi QR</span><h3>Алдын ала төлемге QR блок</h3><p>Бұл demo Kaspi QR визуалы предоплата модулін көрсету үшін енгізілді. Төлем статусын кабинет пен админ панельден көресіз.</p><div class="cta-actions mobile-stack"><a class="btn btn-success full" href="https://wa.me/77475480688" target="_blank" rel="noopener">WhatsApp-қа тез өту</a><a class="btn btn-secondary full" href="mailto:makomngoi@gmail.com">Email ашу</a></div></div></div><div class="divider"></div><h3>Бөлек предоплата енгізу</h3><form id="prepayForm" class="stack-form"><div class="grid-2"><input type="number" name="bookingId" placeholder="Бронь ID"/><input type="number" name="amount" placeholder="Сома" required/></div><input type="hidden" name="type" value="Kaspi QR"/><button class="btn btn-secondary" type="submit">Предоплата қосу</button><p class="form-message" id="prepayMessage"></p></form></aside></main><div data-include="footer"></div><script src="/js/app.js"></script></body></html>
